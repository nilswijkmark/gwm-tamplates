name: Compose GWM Promo Video
on:
  workflow_dispatch:
    inputs:
      video_slug:
        description: 'Video slug'
        required: true
      beats_json:
        description: 'JSON array of beat file paths'
        required: true
      beats_metadata:
        description: 'JSON array of beat metadata'
        required: true
      end_card_vo:
        description: 'End card voiceover text'
        required: true
      music_url:
        description: 'Music file path'
        required: true
      total_duration:
        description: 'Total duration in seconds'
        required: true
      george_vo_url:
        description: 'Signed URL for George VO'
        required: true
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get install -y ffmpeg bc

      - name: Download beats and music
        env:
          BEATS_JSON: "${{ inputs.beats_json }}"
          MUSIC_URL: "${{ inputs.music_url }}"
        run: |
          CLEAN_MUSIC="${MUSIC_URL#=}"
          curl -L "https://jrryyntxjiqbgrhoorbx.supabase.co/storage/v1/object/public/${CLEAN_MUSIC}" -o music_raw.mp3
          node -e "const raw=(process.env.BEATS_JSON||'').replace(/^=/,'');const base='https://jrryyntxjiqbgrhoorbx.supabase.co/storage/v1/object/public/';const beats=JSON.parse(raw);const {execSync}=require('child_process');beats.forEach((p,i)=>{console.log('Beat '+i+': '+p);execSync('curl -L '+JSON.stringify(base+p)+' -o beat_raw_'+i+'.mp4',{stdio:'inherit'});});"

      - name: Process music bed
        env:
          TOTAL_DURATION: "${{ inputs.total_duration }}"
        run: |
          DURATION="${TOTAL_DURATION#=}"
          ffmpeg -y -i music_raw.mp3 -t $DURATION \
            -af "volume=0.14,afade=t=in:st=0:d=0.6,afade=t=out:st=$(echo "$DURATION - 1.2" | bc):d=1.2" \
            -c:a aac -b:a 160k music.aac

      - name: Compose beats
        env:
          BEATS_METADATA: "${{ inputs.beats_metadata }}"
        run: |
          node -e "
          const raw=(process.env.BEATS_METADATA||'').replace(/^=/,'');
          const beats=JSON.parse(raw);
          const {execSync,writeFileSync}=require('child_process');
          const fs=require('fs');
          const base='https://jrryyntxjiqbgrhoorbx.supabase.co/storage/v1/object/public/';
          beats.forEach((b,i)=>{
            const hflip=b.hflip==='true'?'hflip,':'';
            const chip='0x'+b.chip_color;
            const charName=b.character.replace(/'/g,'\u2019');
            const words=b.text.split(' ');
            let chunks=[],cur=[];
            words.forEach(w=>{
              const test=[...cur,w].join(' ');
              if(cur.length&&(test.length>22||cur.length>=4)){chunks.push(cur.join(' '));cur=[w];}
              else cur.push(w);
              if(/[.,?!;:]$/.test(w)&&cur.length){chunks.push(cur.join(' '));cur=[];}
            });
            if(cur.length)chunks.push(cur.join(' '));
            const dur=parseFloat(b.duration_hint)||3;
            const start=0.25;
            const end=Math.max(start+0.4,Math.min(dur-0.2,dur));
            const span=(end-start)/Math.max(1,chunks.length);
            let captionFilter='';
            chunks.forEach((chunk,ci)=>{
              const s=(start+ci*span).toFixed(2);
              const e=(start+(ci+1)*span).toFixed(2);
              const tf='caption_'+i+'_'+ci+'.txt';
              fs.writeFileSync(tf,chunk);
              captionFilter+='drawtext=fontsize=36:fontcolor=white:x=(w-text_w)/2:y=960:textfile='+tf+':enable=between(t\\,'+s+'\\,'+e+'),';
            });
            captionFilter=captionFilter.replace(/,$/,'');
            const filter=
              '[0:v]'+hflip+'scale=-2:1080,crop=1080:1080:(iw-1080)/2:0,'+
              'colorchannelmixer=rr=1.05:gg=1.02:bb=0.92,eq=saturation=1.05,'+
              'vignette=PI/5,'+
              'drawbox=x=0:y=900:w=1080:h=170:color=black@0.68:t=fill,'+
              'drawbox=x=26:y=28:w=170:h=64:color='+chip+'@0.94:t=fill,'+
              'drawbox=x=26:y=92:w=170:h=4:color=0xD4A84C@1:t=fill,'+
              'drawtext=fontsize=30:fontcolor=white:x=46:y=43:text='+charName+','+
              captionFilter+
              '[v]';
            const cmd='ffmpeg -y -i beat_raw_'+i+'.mp4 -filter_complex '+JSON.stringify(filter)+
              ' -map [v] -map 0:a -r 30 -c:v libx264 -pix_fmt yuv420p -crf 18 -c:a aac -b:a 160k beat_'+i+'.mp4';
            console.log('Composing beat '+i+': '+b.character);
            execSync(cmd,{stdio:'inherit'});
          });
          "

      - name: Download George VO
        env:
          GEORGE_VO_URL: "${{ inputs.george_vo_url }}"
        run: |
          CLEAN_URL="${GEORGE_VO_URL#=}"
          curl -L "https://jrryyntxjiqbgrhoorbx.supabase.co/storage/v1${CLEAN_URL}" -o george_v
