<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', sans-serif; }

  .post {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 72px;
  }

  .logo { position: absolute; top: 52px; left: 52px; width: 96px; height: 96px; }
  .handle { position: absolute; top: 76px; right: 52px; font-size: 22px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }
  .tag { font-size: 24px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 20px; }
  .headline { font-size: 88px; font-weight: 800; line-height: 1.05; margin-bottom: 24px; }
  .sub { font-size: 32px; font-weight: 500; }

  /* HERO */
  .hero { background: #286649; }
  .hero .handle { color: rgba(255,255,255,0.3); }
  .hero .tag { color: #BD8B18; }
  .hero .headline { color: #F7F8F5; }
  .hero .sub { color: #BD8B18; }
  .hero .deco { position: absolute; top: -60px; right: -60px; width: 320px; height: 320px; border-radius: 50%; background: rgba(189,139,24,0.1); }

  /* NIGHT */
  .night { background: #101814; }
  .night .handle { color: rgba(255,255,255,0.2); }
  .night .tag { color: #EDBD2A; }
  .night .headline { color: #F7F8F5; }
  .night .sub { color: rgba(255,255,255,0.45); }
  .night .accent { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; background: #EDBD2A; }

  /* SAND */
  .sand { background: #E8DDC9; }
  .sand .handle { color: rgba(24,36,30,0.25); }
  .sand .tag { color: #286649; }
  .sand .headline { color: #18241E; }
  .sand .sub { color: #1F4D2A; }
  .sand .topbar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: #286649; }

  /* CREAM */
  .cream { background: #F7F8F5; }
  .cream .handle { color: rgba(24,36,30,0.2); }
  .cream .tag { color: #BD8B18; }
  .cream .headline { color: #18241E; }
  .cream .sub { color: #286649; font-weight: 600; }
  .cream .badge { position: absolute; top: 52px; right: 52px; background: #286649; color: #F7F8F5; font-size: 20px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 10px 20px; border-radius: 8px; }.badge:empty { display: none; }

  /* SKY */
  .sky { background: #DEEEF6; }
  .sky .handle { color: rgba(24,36,30,0.2); }
  .sky .tag { color: #286649; }
  .sky .headline { color: #18241E; }
  .sky .sub { color: #185FA5; }

  /* STAT */
  .stat { background: #286649; align-items: center; justify-content: center; gap: 12px; }
  .stat .num { font-size: 280px; font-weight: 800; color: #BD8B18; line-height: 1; }
  .stat .unit { font-size: 28px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .stat .desc { font-size: 40px; font-weight: 600; color: #F7F8F5; text-align: center; max-width: 700px; }
  .stat .handle { top: auto; bottom: 52px; right: 52px; color: rgba(255,255,255,0.25); }

  .logo-svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<!--
  TEMPLATE VARIABLE REFERENCE (replace these in n8n Code node before calling htmlcsstoimage):
  {{TEMPLATE}}    = hero | night | sand | cream | sky | stat
  {{TAG}}         = e.g. "Feature drop"
  {{HEADLINE}}    = e.g. "Score smarter.\nBeat your mates."
  {{SUB}}         = e.g. "New live leaderboard →"
  {{BADGE_LABEL}} = e.g. "Pro tip" (cream only)
  {{STAT_NUM}}    = e.g. "37" (stat only)
  {{STAT_UNIT}}   = e.g. "Points · Stableford" (stat only)
  {{STAT_DESC}}   = e.g. "That's a round to remember." (stat only)
-->
